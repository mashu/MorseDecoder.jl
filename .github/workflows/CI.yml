name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Julia 1.11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone unregistered dependencies
        run: |
          git clone https://github.com/mashu/MorseSimulator.jl.git ../MorseSimulator.jl
          git clone https://github.com/mashu/CTCLoss.jl.git ../CTCLoss.jl

      - name: Set up Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.11'

      - name: Use path deps for unregistered packages (avoid resolve from registry)
        run: |
          sed -i 's|CTCLoss = "2db49016-8a32-4079-a8aa-ecf024ad7df3"|CTCLoss = { path = "../CTCLoss.jl" }|' Project.toml
          sed -i 's|MorseSimulator = "3b0fb1b5-c03f-4daf-ad66-a200d384d209"|MorseSimulator = { path = "../MorseSimulator.jl" }|' Project.toml

      - name: Install dependencies and run tests
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --project=. -e 'using Pkg; Pkg.test()'
        env:
          JULIA_PKG_SERVER: ""
