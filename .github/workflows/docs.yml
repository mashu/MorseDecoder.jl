name: Documenter

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone unregistered dependencies
        run: |
          git clone https://github.com/mashu/MorseSimulator.jl.git ../MorseSimulator.jl
          git clone https://github.com/mashu/CTCLoss.jl.git ../CTCLoss.jl

      - name: Set up Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.11'

      - name: Install dependencies and build docs (single process to avoid get_uuid_name bug)
        run: |
          julia -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.Registry.add(url="https://github.com/MurrellGroup/MurrellGroupRegistry")
            Pkg.activate(".")
            Pkg.develop([Pkg.PackageSpec(path="../CTCLoss.jl"), Pkg.PackageSpec(path="../MorseSimulator.jl")])
            Pkg.instantiate()
            Pkg.activate("docs")
            Pkg.develop(path=".")  # repo root (cwd) is MorseDecoder.jl
            Pkg.instantiate()
            include("docs/make.jl")
          '
        env:
          JULIA_PKG_SERVER: ""

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
