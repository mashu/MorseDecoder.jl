name: Codecov

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone unregistered dependencies
        run: |
          git clone https://github.com/mashu/MorseSimulator.jl.git ../MorseSimulator.jl
          git clone https://github.com/mashu/CTCLoss.jl.git ../CTCLoss.jl

      - name: Set up Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.11'

      - name: Install, test with coverage, generate lcov (single process to avoid get_uuid_name bug)
        run: |
          julia --project=. --code-coverage=user -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.Registry.add(url="https://github.com/MurrellGroup/MurrellGroupRegistry")
            Pkg.develop([Pkg.PackageSpec(path="../CTCLoss.jl"), Pkg.PackageSpec(path="../MorseSimulator.jl")])
            Pkg.instantiate()
            Pkg.test()
            Pkg.add("Coverage")
            using Coverage
            data = process_folder()
            LCOV.write("lcov.info", data)
          '
        env:
          JULIA_PKG_SERVER: ""

      - name: Submit to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          verbose: true
